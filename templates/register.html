{% extends "base.html" %}
{% block title %}Open a Shop — KhmerShop{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
  <div class="card">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size:2.5rem;">🏪</div>
      <h1 style="font-size:1.5rem; font-weight:800; color:var(--navy); margin-top:8px;">Open Your Shop</h1>
      <p style="color:var(--muted); font-size:.9rem;">Start selling and get paid via Bakong</p>
    </div>

    <form method="POST">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 16px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="sokha_shop" required minlength="3"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="012 345 678"/>
        </div>
      </div>

      <div class="form-group">
        <label>Shop Name</label>
        <input type="text" name="shop_name" placeholder="Sokha's Fashion House" required/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="sokha@gmail.com" required/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>

      <div class="form-group">
        <label>Bakong Account ID</label>
        <input type="text" name="bakong_account" placeholder="sokha@bakong" required/>
        <div class="form-hint">Your Bakong account ID (e.g. <strong>yourname@bakong</strong>). Buyers will pay directly to this account.</div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:13px;">
        Open Shop — Free →
      </button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:.88rem; color:var(--muted);">
      Already have a shop? <a href="{{ url_for('login') }}" style="color:var(--navy); font-weight:600;">Login →</a>
    </p>
  </div>
</div>
{% endblock %}
