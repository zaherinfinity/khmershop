{% extends "base.html" %}
{% block title %}Login — KhmerShop{% endblock %}
{% block content %}
<div class="container" style="max-width:440px;">
  <div class="card">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size:2.5rem;">🛍️</div>
      <h1 style="font-size:1.5rem; font-weight:800; color:var(--navy); margin-top:8px;">Seller Login</h1>
      <p style="color:var(--muted); font-size:.9rem;">Access your shop dashboard</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-dark" style="width:100%; justify-content:center; padding:12px; margin-top:4px;">
        Login →
      </button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:.88rem; color:var(--muted);">
      No shop yet? <a href="{{ url_for('register') }}" style="color:var(--navy); font-weight:600;">Open one free →</a>
    </p>
  </div>
</div>
{% endblock %}
